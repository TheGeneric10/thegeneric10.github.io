<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OranAI v0.26.0301</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" />
  <style>
    :root {
      color-scheme: light dark;
      --bg:#0c0917; --panel:rgba(20,16,35,.8); --text:#f3eeff; --muted:#c4bbdf;
      --stroke:rgba(195,160,255,.28); --purple:#8f5fff; --purple2:#b68cff;
    }
    [data-theme="light"] { --bg:#f5f2ff; --panel:rgba(255,255,255,.86); --text:#251b3f; --muted:#594d77; --stroke:rgba(83,52,147,.22); --purple:#7448e9; --purple2:#9b75ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,Segoe UI,Arial,sans-serif; color:var(--text); background:var(--bg); min-height:100vh; user-select:none; overflow:hidden; }
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24;vertical-align:middle;line-height:1}

    .bgfx, .bgfx::before, .bgfx::after { position:fixed; inset:-20%; pointer-events:none; z-index:-1; transform:translate3d(0,0,0); will-change:transform,opacity; }
    .bgfx { background: radial-gradient(circle at 20% 30%, rgba(143,95,255,.22), transparent 35%), radial-gradient(circle at 80% 70%, rgba(182,140,255,.2), transparent 38%); animation: float 20s ease-in-out infinite; }
    .bgfx::before, .bgfx::after { content:""; background: linear-gradient(120deg, rgba(143,95,255,.16), transparent, rgba(182,140,255,.16)); background-size:220% 220%; animation: move 18s linear infinite; }
    .bgfx::after { animation-duration:18s; mix-blend-mode:screen; opacity:.7; }
    @keyframes move {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes float {0%{transform:translateY(0)}50%{transform:translateY(12px)}100%{transform:translateY(0)}}

    .layout { display:grid; grid-template-columns:300px 1fr; height:100vh; }
    .side { border-right:1px solid var(--stroke); background:color-mix(in srgb,var(--panel) 90%,transparent); padding:16px; display:grid; grid-template-rows:auto auto 1fr auto; gap:14px; }
    .brand { display:flex; align-items:center; gap:10px; font-weight:700; }
    .brand b { width:34px; height:34px; display:grid; place-items:center; border-radius:10px; background:linear-gradient(145deg,var(--purple),var(--purple2)); color:white; }
    .new-btn, .send-btn, .theme-btn, .home-btn { border:1px solid var(--stroke); background:var(--panel); color:var(--text); border-radius:12px; padding:10px 12px; cursor:pointer; }
    .chat-list { overflow:auto; display:grid; gap:8px; }
    .chat-item { border:1px solid var(--stroke); background:color-mix(in srgb,var(--panel) 78%,transparent); border-radius:10px; padding:10px; cursor:pointer; color:var(--muted); }
    .chat-item.active { border-color:var(--purple2); color:var(--text); }
    .meta { color:var(--muted); font-size:.86rem; }

    .main { display:grid; grid-template-rows:auto 1fr auto; min-width:0; }
    .top { padding:16px 20px; border-bottom:1px solid var(--stroke); display:flex; justify-content:space-between; align-items:center; }
    .title { margin:0; font-size:1.2rem; }
    .messages { padding:18px 22px; overflow:auto; display:grid; gap:12px; align-content:start; }
    .bubble { max-width:80ch; border:1px solid var(--stroke); border-radius:14px; padding:12px 14px; background:color-mix(in srgb,var(--panel) 84%,transparent); }
    .bubble.user { justify-self:end; background:color-mix(in srgb,var(--purple) 18%,var(--panel)); }
    .bubble.assistant { justify-self:start; }
    .elapsed { margin-top:8px; color:var(--muted); font-size:.8rem; }

    .composer { border-top:1px solid var(--stroke); padding:14px 20px 18px; display:grid; gap:10px; }
    .status { color:var(--muted); min-height:1.2rem; display:flex; align-items:center; gap:8px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--purple2); animation:pulse 1s infinite; }
    @keyframes pulse {0%,100%{opacity:.35; transform:scale(.8)}50%{opacity:1; transform:scale(1)}}
    .row { display:grid; grid-template-columns:1fr auto; gap:10px; }
    textarea { width:100%; min-height:74px; resize:vertical; border:1px solid var(--stroke); border-radius:12px; padding:12px; background:var(--panel); color:var(--text); font:inherit; }

    .settings { border:1px solid var(--stroke); border-radius:12px; background:color-mix(in srgb,var(--panel) 82%,transparent); padding:10px; display:grid; gap:8px; }
    .setting-title { margin:0; font-size:.84rem; color:var(--muted); }
    .setting-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .check, .radio, .switch { display:inline-flex; align-items:center; gap:8px; color:var(--muted); font-size:.86rem; cursor:pointer; }
    .check input, .radio input, .switch input { appearance:none; -webkit-appearance:none; outline:none; margin:0; cursor:pointer; transition:.2s ease; }
    .check input { width:18px; height:18px; border-radius:5px; border:1px solid var(--stroke); background:var(--panel); position:relative; }
    .check input:checked { background:var(--purple); border-color:var(--purple2); }
    .check input:checked::after { content:""; position:absolute; width:4px; height:8px; border:2px solid white; border-top:none; border-left:none; transform:rotate(45deg); left:6px; top:2px; }
    .radio input { width:18px; height:18px; border-radius:50%; border:1px solid var(--stroke); background:var(--panel); }
    .radio input:checked { box-shadow: inset 0 0 0 4px var(--panel), inset 0 0 0 10px var(--purple2); border-color:var(--purple2); }
    .switch input { width:42px; height:24px; border-radius:16px; border:1px solid var(--stroke); background:rgba(255,255,255,.08); position:relative; }
    .switch input::after { content:""; position:absolute; width:16px; height:16px; border-radius:50%; background:white; top:3px; left:3px; transition:.22s ease; }
    .switch input:checked { background:var(--purple); border-color:var(--purple2); }
    .switch input:checked::after { transform:translateX(18px); }

    *::-webkit-scrollbar { width:12px; height:12px; }
    *::-webkit-scrollbar-track { background:color-mix(in srgb,var(--panel) 72%, transparent); border-radius:12px; }
    *::-webkit-scrollbar-thumb { background:linear-gradient(180deg,var(--purple),var(--purple2)); border-radius:12px; border:2px solid transparent; background-clip:padding-box; }
    * { scrollbar-color: var(--purple2) color-mix(in srgb,var(--panel) 72%, transparent); scrollbar-width: thin; }

    .popup { position:fixed; top:24px; right:24px; border:1px solid var(--stroke); background:color-mix(in srgb,var(--purple) 28%,var(--panel)); border-radius:14px; padding:12px 14px; box-shadow:0 16px 40px rgba(40,18,74,.35); animation:pop .45s ease both; }
    @keyframes pop {0%{opacity:0; transform:translateY(-10px) scale(.96)}100%{opacity:1; transform:translateY(0) scale(1)}}
    @media (prefers-reduced-motion: reduce) {
      .bgfx, .bgfx::before, .bgfx::after, .dot, .popup { animation:none !important; }
    }
  </style>
</head>
<body>
  <div class="bgfx" aria-hidden="true"></div>
  <div class="popup" id="welcomePopup">Welcome to OranAI made by TheGeneric · oran-a1 (v0.26.0301)</div>

  <div class="layout">
    <aside class="side">
      <div class="brand"><b>OA</b> <span>OranAI · oran-a1</span></div>
      <button class="new-btn" id="newChatBtn"><span class="material-symbols-outlined">add</span> New Chat</button>
      <div class="chat-list" id="chatList" aria-label="Chat history"></div>
      <button class="home-btn" onclick="location.href='index.html'"><span class="material-symbols-outlined">home</span> Back to TheGeneric</button>
    </aside>

    <section class="main">
      <header class="top">
        <h1 class="title">OranAI Website Area · ver-0.26.0301</h1>
        <button class="theme-btn" id="themeBtn"><span class="material-symbols-outlined" id="themeIcon">dark_mode</span></button>
      </header>

      <div class="messages" id="messages"></div>

      <div class="composer">
        <div class="status" id="status"></div>
        <div class="settings">
          <p class="setting-title">Generation controls</p>
          <div class="setting-row">
            <label class="check"><input type="checkbox" id="streamFx" checked> Animated generation indicator</label>
            <label class="switch"><input type="checkbox" id="compactMode"> Compact message spacing</label>
          </div>
          <div class="setting-row">
            <label class="radio"><input type="radio" name="responseTone" value="balanced" checked> Balanced</label>
            <label class="radio"><input type="radio" name="responseTone" value="concise"> Concise</label>
            <label class="radio"><input type="radio" name="responseTone" value="detailed"> Detailed</label>
          </div>
        </div>
        <div class="row">
          <textarea id="prompt" placeholder="Ask oran-a1 anything..."></textarea>
          <button class="send-btn" id="sendBtn"><span class="material-symbols-outlined">send</span> Send</button>
        </div>
        <div class="meta">Local guest save enabled: chat list and theme are stored locally, and server stores message history in SQLite.</div>
      </div>
    </section>
  </div>

  <script>
    const root = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');
    const themeIcon = document.getElementById('themeIcon');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const promptEl = document.getElementById('prompt');
    const messagesEl = document.getElementById('messages');
    const statusEl = document.getElementById('status');
    const chatListEl = document.getElementById('chatList');
    const streamFxEl = document.getElementById('streamFx');
    const compactModeEl = document.getElementById('compactMode');
    let activeChatId = localStorage.getItem('oranai-active-chat') || '';
    const savedTone = localStorage.getItem('oranai-tone') || 'balanced';
    const apiBase = (localStorage.getItem('oranai-api-base') || `${location.protocol}//${location.hostname || '127.0.0.1'}:8000`).replace(/\/$/, '');

    document.querySelectorAll('input[name="responseTone"]').forEach((radio) => {
      radio.checked = radio.value === savedTone;
      radio.addEventListener('change', () => localStorage.setItem('oranai-tone', radio.value));
    });

    compactModeEl.checked = localStorage.getItem('oranai-compact-mode') === '1';
    const applyCompactMode = () => {
      messagesEl.style.gap = compactModeEl.checked ? '8px' : '12px';
      localStorage.setItem('oranai-compact-mode', compactModeEl.checked ? '1' : '0');
    };
    compactModeEl.addEventListener('change', applyCompactMode);
    applyCompactMode();

    function setTheme(theme) {
      root.setAttribute('data-theme', theme);
      themeIcon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
      localStorage.setItem('thegeneric-theme', theme);
    }

    const savedTheme = localStorage.getItem('thegeneric-theme');
    setTheme(savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

    themeBtn.addEventListener('click', () => setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    function bubble(role, text, elapsedMs) {
      const el = document.createElement('article');
      el.className = `bubble ${role}`;
      el.innerHTML = `<strong>${role === 'user' ? 'You' : 'oran-a1'}</strong><div>${text.replace(/</g, '&lt;')}</div>${elapsedMs ? `<div class="elapsed">Generated in ${(elapsedMs/1000).toFixed(2)}s</div>` : ''}`;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function apiFetch(path, options) {
      const res = await fetch(`${apiBase}${path}`, options);
      const text = await res.text();
      let data;
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        throw new Error(`Invalid JSON from ${path}. If you opened this page with a static server, start OranAI backend: python oran_a1_server.py`);
      }
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status} from ${path}`);
      return data;
    }

    async function loadChats() {
      const data = await apiFetch('/api/chats');
      chatListEl.innerHTML = '';
      for (const c of data.chats) {
        const item = document.createElement('button');
        item.className = `chat-item ${c.chat_id === activeChatId ? 'active' : ''}`;
        item.textContent = c.title;
        item.onclick = async () => {
          activeChatId = c.chat_id;
          localStorage.setItem('oranai-active-chat', activeChatId);
          await loadChats();
          await loadMessages(activeChatId);
        };
        chatListEl.appendChild(item);
      }
      if (!activeChatId && data.chats[0]) {
        activeChatId = data.chats[0].chat_id;
        localStorage.setItem('oranai-active-chat', activeChatId);
      }
    }

    async function loadMessages(chatId) {
      if (!chatId) return;
      const data = await apiFetch(`/api/chats/${chatId}`);
      messagesEl.innerHTML = '';
      for (const m of data.messages) bubble(m.role, m.content, m.elapsed_ms);
    }

    async function send() {
      const prompt = promptEl.value.trim();
      if (!prompt) return;
      promptEl.value = '';
      bubble('user', prompt);
      const start = performance.now();
      statusEl.innerHTML = streamFxEl.checked ? '<span class="dot"></span> oran-a1 is generating...' : 'oran-a1 is generating...';
      sendBtn.disabled = true;
      const tone = document.querySelector('input[name="responseTone"]:checked')?.value || 'balanced';
      const data = await apiFetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ chat_id: activeChatId, prompt, tone })
      });
      sendBtn.disabled = false;
      if (data.chat_id) {
        activeChatId = data.chat_id;
        localStorage.setItem('oranai-active-chat', activeChatId);
      }
      if (data.ok) {
        bubble('assistant', data.answer, data.elapsed_ms);
      } else {
        bubble('assistant', data.error || 'Generation failed.');
      }
      await loadChats();
      statusEl.textContent = `Done in ${((performance.now() - start)/1000).toFixed(2)}s · API ${apiBase}`;
      setTimeout(() => { statusEl.textContent = ''; }, 1600);
    }

    newChatBtn.addEventListener('click', async () => {
      const data = await apiFetch('/api/chats', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title: 'New Chat'})});
      activeChatId = data.chat_id;
      localStorage.setItem('oranai-active-chat', activeChatId);
      messagesEl.innerHTML = '';
      await loadChats();
    });

    sendBtn.addEventListener('click', send);
    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    document.addEventListener('dragstart', (event) => event.preventDefault());
    setTimeout(() => { const p = document.getElementById('welcomePopup'); if (p) p.remove(); }, 2600);

    (async () => {
      try {
        await loadChats();
        if (activeChatId) await loadMessages(activeChatId);
      } catch (error) {
        statusEl.textContent = error.message;
      }
    })();
  </script>
</body>
</html>
